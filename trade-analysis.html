<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Trading Analysis - Volatility 100 Index M5</title>\n    <style>\n        body {\n            background-color: #121212;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        canvas {\n            border: 1px solid #444;\n        }\n        .trade-summary {\n            margin-top: 20px;\n            background-color: #1e1e1e;\n            padding: 10px;\n            border-radius: 8px;\n        }\n        .levels {\n            display: flex;\n            justify-content: space-between;\n            margin-top: 10px;\n        }\n        .zone {\n            padding: 5px;\n            border-radius: 4px;\n        }\n        .bullish {\n            background-color: green;\n            color: white;\n        }\n        .bearish {\n            background-color: red;\n            color: white;\n        }\n    </style>\n</head>\n<body>\n    <h1>Trading Analysis Visualization</h1>\n    <canvas id=\"analysisCanvas\" width=\"800\" height=\"400\"></canvas>\n    <div class=\"trade-summary\">\n        <h2>Trade Summary</h2>\n        <div class=\"levels\">\n            <div class=\"zone bullish\">Entry Zone</div>\n            <div class=\"zone bearish\">SL Level</div>\n            <div class=\"zone bullish\">TP1 Level</div>\n            <div class=\"zone bullish\">TP2 Level</div>\n            <div class=\"zone bullish\">TP3 Level</div>\n        </div>\n        <p>Market Structure: [Annotation of key market structures]</p>\n    </div>\n    <script>\n        const canvas = document.getElementById('analysisCanvas');\n        const ctx = canvas.getContext('2d');\n        // Example data for visualization\n        const priceLevels = [1000, 1100, 1200, 1300]; // Example price levels\n        const entryZone = 1150;\n        const SL = 1080;\n        const TPs = [1190, 1250, 1300];\n        // Draw price levels\n        ctx.strokeStyle = 'white';\n        priceLevels.forEach(level => {\n            ctx.beginPath();\n            ctx.moveTo(0, level);\n            ctx.lineTo(canvas.width, level);\n            ctx.stroke();\n        });\n        // Draw entry zone\n        ctx.fillStyle = 'green';\n        ctx.fillRect(0, entryZone - 10, canvas.width, 20);\n        ctx.fillStyle = 'red';\n        ctx.fillRect(0, SL - 10, canvas.width, 20);\n        TPs.forEach((tp, index) => {\n            ctx.fillStyle = 'green';\n            ctx.fillRect(0, tp - 10, canvas.width, 20);\n        });\n    <\/script>\n</body>\n</html>\n
